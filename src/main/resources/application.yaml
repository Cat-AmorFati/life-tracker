spring:
  application:
    name: life-tracker
  datasource:
    url: jdbc:mysql://localhost:3306/life-tracker?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  devtools:
    restart:
      enabled: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yuhang.lifetracker.entity

server:
  port: 8081